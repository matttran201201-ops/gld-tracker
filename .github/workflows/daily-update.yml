name: Daily GLD data refresh

on:
  schedule:
    # 22:30 UTC = after NYSE close; runs Tue-Sat UTC to capture Mon-Fri trading days
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install xlsx --no-audit --no-fund
      - run: node update.js
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json gld_flows.csv iau_live.json
          if git diff --cached --quiet; then
            echo "No new data"
          else
            git commit -m "Data refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
